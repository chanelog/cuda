name: VPN Panel CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  shellcheck:
    name: ShellCheck (Syntax Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all scripts
        run: |
          echo "=== Checking shell scripts ==="
          shellcheck --severity=warning \
            install.sh \
            download-bins.sh \
            menu.sh \
            user-manager.sh \
            monitor.sh \
            expired-check.sh
          echo "✓ All scripts passed shellcheck"

  test-ubuntu:
    name: Test Install - Ubuntu Latest
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x *.sh

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl wget unzip jq uuid-runtime \
            net-tools openssl ca-certificates python3 python3-pip \
            cmake gcc g++ make git

      - name: Test binary version fetch
        run: |
          XRAY_VER=$(curl -fsSL "https://api.github.com/repos/XTLS/Xray-core/releases/latest" \
            | jq -r '.tag_name')
          echo "Latest Xray: $XRAY_VER"
          [ -n "$XRAY_VER" ] && echo "✓ OK" || echo "✗ FAILED"

      - name: Test script structure
        run: |
          for f in install.sh download-bins.sh menu.sh user-manager.sh monitor.sh expired-check.sh README.md LICENSE .gitignore; do
            [ -f "$f" ] && echo "✓ $f exists" || echo "✗ $f MISSING"
          done

  test-debian:
    name: Test - Debian Compatibility
    runs-on: ubuntu-latest
    needs: shellcheck
    container:
      image: debian:12
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install base tools
        run: |
          apt-get update -y
          apt-get install -y curl wget jq bash coreutils

      - name: Check OS detection
        run: |
          . /etc/os-release
          echo "Detected: $ID $VERSION_ID"
          case "$ID" in
            ubuntu|debian) echo "✓ OS supported" ;;
            *) echo "✗ Not supported"; exit 1 ;;
          esac

      - name: Validate shebang lines
        run: |
          for f in install.sh download-bins.sh menu.sh user-manager.sh; do
            head -1 "$f" | grep -q "#!/bin/bash" && \
              echo "✓ $f OK" || echo "✗ $f missing shebang"
          done

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ test-ubuntu, test-debian ]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create release zip
        run: |
          zip -r vpn-panel-${{ github.ref_name }}.zip . \
            --exclude ".git/*" \
            --exclude "*.log" \
            --exclude "users/*" \
            --exclude "*.db"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VPN Panel ${{ github.ref_name }}
          body: |
            ## VPN Panel ${{ github.ref_name }}
            ### Cara Install
```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh)
```
          files: vpn-panel-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
