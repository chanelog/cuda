name: VPN Panel CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  shellcheck:
    name: ShellCheck Syntax Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          shellcheck --severity=error \
            install.sh \
            download-bins.sh \
            menu.sh \
            user-manager.sh \
            monitor.sh \
            expired-check.sh
          echo "All scripts passed"

  test-ubuntu:
    name: Test Ubuntu
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make executable
        run: chmod +x *.sh

      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl wget unzip jq \
            openssl python3 python3-pip cmake gcc g++ make git

      - name: Check files exist
        run: |
          for f in install.sh download-bins.sh menu.sh \
            user-manager.sh monitor.sh expired-check.sh \
            README.md LICENSE .gitignore; do
            [ -f "$f" ] && echo "OK $f" || echo "MISSING $f"
          done

      - name: Check xray version API
        run: |
          VER=$(curl -fsSL \
            "https://api.github.com/repos/XTLS/Xray-core/releases/latest" \
            | jq -r '.tag_name')
          echo "Xray latest: $VER"

  test-debian:
    name: Test Debian
    runs-on: ubuntu-latest
    needs: shellcheck
    container:
      image: debian:12
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          apt-get update -y
          apt-get install -y curl wget jq bash

      - name: Check OS
        run: |
          . /etc/os-release
          echo "OS: $ID $VERSION_ID"
          case "$ID" in
            ubuntu|debian) echo "Supported" ;;
            *) exit 1 ;;
          esac

      - name: Check shebang
        run: |
          for f in install.sh download-bins.sh menu.sh user-manager.sh; do
            head -1 "$f" | grep -q "#!/bin/bash" && \
              echo "OK $f" || echo "FAIL $f"
          done
